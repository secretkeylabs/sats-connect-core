name: Build and Publish NPM package

on:
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # actions/checkout@v4

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e #v4.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run ci

      - id: current-version
        name: Get current version
        run: echo "CURRENT_VERSION=$(npm pkg get version  | tr -d '"')" >> $GITHUB_OUTPUT

      - id: sha
        name: Get commit sha
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - id: publish-version
        name: Set publish version
        run: |
          PUBLISH_VERSION=$CURRENT_VERSION-$SHA
          npm version --no-git-tag-version $PUBLISH_VERSION
          echo PUBLISH_VERSION=$PUBLISH_VERSION >> $GITHUB_OUTPUT
        env:
          SHA: ${{ steps.sha.outputs.SHA }}
          CURRENT_VERSION: ${{ steps.current-version.outputs.CURRENT_VERSION }}

      - name: Publish to NPM package registry
        run: |
          echo "@sats-connect:registry=https://registry.npmjs.org/" > .npmrc
          echo "//registry.npmjs.org/:_authToken=$AUTH_TOKEN" >> .npmrc
          npm publish --access=public --tag pr-$PR_NUMBER
        env:
          AUTH_TOKEN: ${{ secrets.NPM_PACKAGE_REGISTRY_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}

      - name: Add package pre-release info
        uses: secretkeylabs/github-actions/add-package-pre-release-info-to-pr@main
        with:
          package-name: '@sats-connect/core'
          version: ${{ steps.publish-version.outputs.PUBLISH_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
